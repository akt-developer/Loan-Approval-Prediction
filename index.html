<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinPredict | AI Loan Approvals</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-color), #1e1b4b);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-top: 2rem;
            margin-bottom: 4rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
        }

        input, select {
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            margin-top: 1rem;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        #result {
            display: none;
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 1.2rem;
            animation: fadeIn 0.5s ease-in-out;
        }

        .approved { background: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; color: #34d399; }
        .denied { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #f87171; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>FinPredict AI</h1>
        <p>Intelligent Logistic Regression Loan Approvals</p>
    </header>

    <div class="container">
        <form id="loanForm">
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" placeholder="e.g. 28" required>
            </div>
            
            <div class="form-group">
                <label for="income">Person Income ($)</label>
                <input type="number" id="income" placeholder="e.g. 65000" required>
            </div>

            <div class="form-group">
                <label for="loanAmount">Loan Amount ($)</label>
                <input type="number" id="loanAmount" placeholder="e.g. 15000" required>
            </div>

            <div class="form-group">
                <label for="creditScore">Credit Score</label>
                <input type="number" id="creditScore" placeholder="e.g. 720" required>
            </div>

            <button type="submit">Predict Approval</button>
        </form>

        <div id="result"></div>
    </div>

    <script>
        document.getElementById('loanForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.querySelector('button');
            const resultDiv = document.getElementById('result');
            
            // UI Loading state
            btn.textContent = 'Analyzing Variables...';
            resultDiv.style.display = 'none';

            // Simulate AI processing delay
            setTimeout(() => {
                const income = parseInt(document.getElementById('income').value);
                const loanAmount = parseInt(document.getElementById('loanAmount').value);
                const score = parseInt(document.getElementById('creditScore').value);
                
                // Simple mock logic based on inputs
                const isApproved = (income > loanAmount * 2) && (score >= 650);
                
                resultDiv.textContent = isApproved ? '✅ Loan Approved!' : '❌ Loan Denied';
                resultDiv.className = isApproved ? 'approved' : 'denied';
                resultDiv.style.display = 'block';
                
                btn.textContent = 'Predict Approval';
            }, 1500);
        });
    </script>
</body>
</html>
